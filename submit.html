<!DOCTYPE html>
<html>
<head>
  <title>Submit Complaint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Submit Civic Complaint</h2>

  <input type="file" id="image"><br><br>
  <input type="text" id="title" placeholder="Complaint Title"><br><br>
  <textarea id="description" placeholder="Description"></textarea><br><br>
  <input type="text" id="location" placeholder="Location"><br><br>
  <input type="text" id="name" placeholder="Your Name"><br><br>
  <input type="text" id="contact" placeholder="Contact Number"><br><br>

  <button onclick="submitComplaint()">Submit</button>
</div>

<script src="script.js"></script>
</body>
</html>
