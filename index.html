<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicFix</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      align-items: center;
      background: white;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
      color: #555;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 60px;
    }

    .hero-left {
      width: 45%;
    }

    .hero-left h1 {
      font-size: 48px;
      line-height: 1.2;
    }

    .highlight {
      color: #22c55e;
    }

    .hero-left p {
      color: #555;
      margin: 20px 0;
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .primary-btn {
      background: black;
      color: white;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
    }

    .secondary-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: #333;
    }

    /* HERO IMAGE */
    .hero-right {
      width: 40%;
      position: relative;
    }

    .circle {
      width: 350px;
      height: 350px;
      background: #ff7a45;
      border-radius: 50%;
      position: absolute;
      top: 20px;
      left: 50px;
      z-index: 0;
    }

    .hero-img {
      width: 100%;
      position: relative;
      z-index: 1;
      border-radius: 10px;
    }

    /* INFO PANEL */
    .info-panel {
      position: absolute;
      right: 40px;
      top: 120px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .info-item {
      margin-bottom: 15px;
    }

    .info-item span {
      display: block;
      color: gray;
      font-size: 12px;
    }

    /* RESPONSIVE */
    @media(max-width: 900px){
      .hero {
        flex-direction: column;
      }

      .hero-left, .hero-right {
        width: 100%;
      }

      .info-panel {
        position: static;
        margin-top: 20px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">CivicFix</div>
  <div class="nav-links">
    <div>Dashboard</div>
    <div>About</div>
    <div>Complaints</div>
    <div>Contact</div>
  </div>
</div>

<!-- HERO -->
<div class="hero">

  <!-- LEFT -->
  <div class="hero-left">
    <h1>
      Let’s solve your <span class="highlight">local problems</span> faster.
    </h1>

    <p>
      Report civic issues like water shortage, garbage, or road damage.  
      Our AI helps classify and resolve problems quickly.
    </p>

    <div class="buttons">
      <!-- KEEPING FUNCTIONALITY -->
      <button class="primary-btn" onclick="window.location.href='submit.html'">
        Submit Complaint
      </button>

      <div class="primary-btn" onclick="window.location.href='dashboard.html'">
         View Dashboard
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="hero-right">
    <div class="circle"></div>

    <!-- Replace with your own image if needed -->
    <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216"
         class="hero-img">

    <!-- INFO PANEL -->
    <div class="info-panel">
      <h4>Live Info</h4>

      <div class="info-item">
        <span>Total Complaints</span>
        <b>28</b>
      </div>

      <div class="info-item">
        <span>In Progress</span>
        <b>12</b>
      </div>

      <div class="info-item">
        <span>Resolved</span>
        <b style="color: green;">16</b>
      </div>

      <div class="info-item">
        <span>Critical</span>
        <b style="color: red;">4</b>
      </div>
    </div>
  </div>

</div>

</body>
</html>
